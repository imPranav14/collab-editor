version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: collab-postgres
    environment:
      POSTGRES_DB: collabdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: collab-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: